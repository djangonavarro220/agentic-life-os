name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
      - name: External Agent Skills scan
        run: npm run lint:external
      - name: Local skill policy lint
        run: npm run lint:local
      - name: Life OS helper tests
        run: npm test
